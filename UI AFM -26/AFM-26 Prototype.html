<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440" />
  <title>AFM-26 — American Football League GM Sim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Data -->
  <script src="data/league.js"></script>

  <!-- Components & screens -->
  <script type="text/babel" src="components/chrome.jsx"></script>
  <script type="text/babel" src="screens/screens-team.jsx"></script>
  <script type="text/babel" src="screens/screens-game.jsx"></script>
  <script type="text/babel" src="screens/screens-front-office.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [active, setActive] = useState('dashboard');

      const screen = (() => {
        switch (active) {
          case 'dashboard': return <ScreenDashboard onNav={setActive} />;
          case 'roster':    return <ScreenRoster />;
          case 'depth':     return <ScreenDepth />;
          case 'strategy':  return <ScreenStrategy />;
          case 'contracts': return <ScreenContracts />;
          case 'training':  return <ScreenTraining />;
          case 'gameweek':  return <ScreenGameWeek />;
          case 'standings': return <ScreenStandings />;
          case 'leaders':   return <ScreenLeaders />;
          case 'scouting':  return <ScreenScouting />;
          case 'draft':     return <ScreenDraft />;
          case 'fa':        return <ScreenFA />;
          case 'trades':    return <ScreenTrades />;
          case 'awards':    return <ScreenAwards />;
          case 'hof':       return <ScreenHoF />;
          default:          return <ScreenDashboard onNav={setActive} />;
        }
      })();

      return (
        <div className="app" data-screen-label={active}>
          <Sidebar active={active} onNav={setActive} />
          <main className="main">{screen}</main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
